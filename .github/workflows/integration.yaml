name: CI

on:
  push:
    branches: [main]
    paths: ['**.py', '**.yaml', '**.yml', 'uv.lock']
  pull_request:
    branches: [main]
    paths: ['**.py', '**.yaml', '**.yml', 'uv.lock']

jobs:
  check_code:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.22"

    - name: hooks
      run: uv run prek run --all-files

    - name: test
      run: uv run pytest --verbose
